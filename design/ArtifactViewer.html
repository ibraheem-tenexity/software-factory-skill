<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Artifact Viewer · Tenexity OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root { --brand: 214 100% 55%; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Hanken Grotesk', ui-sans-serif, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility; background: #FAFAFA;
  }
  button, textarea, input { font-family: inherit; }
  :where(button, [role="button"], a, input, select, textarea, [tabindex]):focus-visible {
    outline: none; box-shadow: 0 0 0 2px #FAFAFA, 0 0 0 4px hsl(var(--brand)); border-radius: 8px;
  }
  ::selection { background: hsl(var(--brand) / 0.22); }
  *::-webkit-scrollbar { width: 11px; height: 11px; }
  *::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 6px; border: 3px solid transparent; background-clip: content-box; }
  *::-webkit-scrollbar-thumb:hover { background: #b6b6bd; background-clip: content-box; }
  @media print {
    aside, header { display: none !important; }
    body, html { height: auto; background: #fff; }
  }
  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="artifactviewer.jsx"></script>
<script type="text/babel" src="recipedata.jsx"></script>

<script type="text/babel" data-presets="react">
  const params = new URLSearchParams(window.location.search);
  const initialId = params.get('doc');
  ReactDOM.createRoot(document.getElementById('root')).render(<ArtifactViewer initialId={initialId} />);
</script>
</body>
</html>
