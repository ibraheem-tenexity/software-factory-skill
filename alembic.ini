# Alembic config for the software-factory console DB (global `public` tables).
# The connection URL is read from $DATABASE_URL in migrations/env.py (never hard-coded here),
# and migrations only run in Postgres mode (SF_DB=postgres). Per-run schema versioning is handled
# separately by software_factory.migrate (the fan-out), not by Alembic revisions directly.
[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
