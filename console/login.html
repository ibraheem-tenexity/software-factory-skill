<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Software Factory — Sign in</title>
  <script src="https://accounts.google.com/gsi/client" async></script>
  <style>
    :root { --primary: #002b5c; --card: #fff; --fg: #1a1d23; --muted: #6b7280; }
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
           background: #f3f5f9; font-family: system-ui, -apple-system, sans-serif; color: var(--fg); }
    .card { background: var(--card); border-radius: 12px; box-shadow: 0 8px 30px rgb(0 0 0 / .08);
            padding: 2.4rem 2.8rem; text-align: center; max-width: 22rem; }
    h1 { font-size: 1.25rem; margin: 0 0 .3rem; color: var(--primary); }
    p { color: var(--muted); font-size: .85rem; margin: 0 0 1.4rem; }
    .g-wrap { display: flex; justify-content: center; }
    #err { color: #b00020; font-size: .8rem; margin-top: 1rem; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Software Factory</h1>
    <p>Sign in to continue</p>
    <div id="g_id_onload" data-client_id="{{CLIENT_ID}}" data-callback="onGoogleCredential"></div>
    <div class="g-wrap"><div class="g_id_signin" data-type="standard" data-theme="outline" data-size="large"></div></div>
    <div id="err">This account is not authorized.</div>
  </div>
  <script>
    window.onGoogleCredential = async (resp) => {
      const r = await fetch("/api/auth/google", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ credential: resp.credential })
      });
      if (r.ok) location.reload();
      else document.getElementById("err").style.display = "block";
    };
  </script>
</body>
</html>
